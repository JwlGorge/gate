services:
  # Backend
  - type: web
    name: gateweb-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gateweb-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.6

  # Frontend
  - type: web
    name: gateweb-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: gateweb-backend
          property: url
