services:
  # Backend
  - type: web
    name: gateweb-backend
    env: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gateweb-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.6

  # Frontend
  - type: web
    name: gateweb-frontend
    env: static
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    staticPublishCustomHeaders:
      - values:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
        path: "/**/*.@(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ico)"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: gateweb-backend
          property: host
